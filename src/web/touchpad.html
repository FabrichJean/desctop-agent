<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Desktop Agent</title>
  <style>
    :root {
      --bg:             #1c1c1e;
      --surface:        #2c2c2e;
      --surface-active: #3a3a3c;
      --border:         #38383a;
      --accent:         #0a84ff;
      --text:           #f2f2f7;
      --muted:          #8e8e93;
      --green:          #30d158;
      --red:            #ff453a;
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%; height: 100dvh;
      overflow: hidden; overscroll-behavior: none;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
      user-select: none; -webkit-user-select: none;
    }

    #app {
      display: flex; flex-direction: column;
      height: 100%; height: 100dvh;
      padding-top:    env(safe-area-inset-top,    0px);
      padding-left:   env(safe-area-inset-left,   0px);
      padding-right:  env(safe-area-inset-right,  0px);
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    /* ── Status bar ── */
    #status-bar {
      flex-shrink: 0; display: flex; align-items: center;
      justify-content: space-between; padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }
    #dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); transition: background 0.4s;
    }
    #dot.on { background: var(--green); }
    #status-text { margin-left: 8px; font-size: 13px; color: var(--muted); }
    #toolbar { display: flex; align-items: center; gap: 2px; }
    #toolbar button {
      background: none; border: none; color: var(--muted);
      font-size: 20px; cursor: pointer; padding: 2px 6px;
      opacity: 0.65; transition: opacity 0.2s, color 0.2s; line-height: 1;
    }
    #toolbar button.active { opacity: 1; color: var(--accent); }

    /* ── Settings panel ── */
    #settings-panel {
      flex-shrink: 0; overflow: hidden; max-height: 0;
      transition: max-height 0.28s ease, padding 0.28s ease;
      background: var(--bg); border-bottom: 1px solid transparent;
    }
    #settings-panel.open {
      max-height: 225px; padding: 12px 16px;
      border-bottom-color: var(--border);
    }
    .setting-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .setting-row:last-child { margin-bottom: 0; }
    .setting-label { font-size: 13px; color: var(--muted); width: 72px; flex-shrink: 0; }
    .seg { display: flex; flex: 1; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
    .seg-btn {
      flex: 1; background: var(--surface); border: none;
      color: var(--muted); font-size: 12px; font-weight: 500;
      padding: 7px 0; cursor: pointer;
      border-right: 1px solid var(--border);
      transition: background 0.15s, color 0.15s;
    }
    .seg-btn:last-child { border-right: none; }
    .seg-btn.active { background: var(--accent); color: #fff; }

    /* ── Tabs ── */
    #tabs { flex-shrink: 0; display: flex; padding: 8px 12px 0; gap: 8px; }
    .tab {
      flex: 1; padding: 8px 0;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px 10px 0 0; border-bottom: none;
      color: var(--muted); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    .tab.active { background: var(--surface-active); color: var(--text); }

    /* ── Content ── */
    #content {
      flex: 1; display: flex; flex-direction: column;
      margin: 0 12px 10px; border: 1px solid var(--border);
      border-radius: 0 0 18px 18px; overflow: hidden; min-height: 0;
    }

    /* ── Touchpad ── */
    #touchpad-panel {
      flex: 1; position: relative; background: var(--surface);
      touch-action: none; transition: background 0.08s;
      display: flex; flex-direction: column; overflow: hidden;
    }
    #touchpad-panel.pressing { background: var(--surface-active); }
    #tp-area { flex: 1; position: relative; }
    #touchpad-panel::before {
      content: ''; position: absolute; inset: 0 0 52px 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 22px 22px; pointer-events: none; z-index: 0;
    }
    #hint {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      pointer-events: none; transition: opacity 0.5s; z-index: 1;
    }
    #hint.hidden { opacity: 0; }
    #hint-icon { font-size: 32px; opacity: 0.22; }
    #hint-text { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.7; }
    #hint-sub  { font-size: 11px; color: var(--muted); opacity: 0.5; text-align: center; }

    /* MacBook-style click bar */
    #click-bar {
      flex-shrink: 0; height: 52px; display: flex; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.07); position: relative;
    }
    #click-bar::after {
      content: ''; position: absolute;
      top: 12px; bottom: 12px; left: 50%; width: 1px;
      background: rgba(255,255,255,0.08);
    }
    .click-zone { flex: 1; height: 100%; display: flex; align-items: center; justify-content: center; }
    .click-zone-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.14); transition: background 0.15s, transform 0.15s;
    }
    .click-zone.flash-left  .click-zone-dot { background: var(--accent); transform: scale(1.6); }
    .click-zone.flash-right .click-zone-dot { background: var(--red);    transform: scale(1.6); }

    /* ripple */
    .ripple {
      position: absolute; border-radius: 50%; width: 54px; height: 54px;
      transform: translate(-50%, -50%) scale(0);
      animation: ripple-anim 0.4s ease-out forwards; pointer-events: none; z-index: 2;
    }
    .ripple.left  { background: rgba(10,132,255,0.32); }
    .ripple.right { background: rgba(255,69,58,0.32); }
    @keyframes ripple-anim { to { transform: translate(-50%, -50%) scale(2.6); opacity: 0; } }

    /* ── Keyboard panel ── */
    #keyboard-panel {
      --rgb: 0;
      flex: 1; background: var(--bg);
      display: none; flex-direction: column; min-height: 0;
    }
    #keyboard-panel.visible { display: flex; }

    /* Typing display */
    #typing-bar {
      flex-shrink: 0; display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid hsla(calc(var(--rgb, 0) * 1), 72%, 54%, 0.48);
      padding: 7px 10px; min-height: 38px;
    }
    #typing-text {
      flex: 1; font-size: 15px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-align: right;
      font-family: "SF Mono", "Menlo", "Courier New", monospace;
      letter-spacing: 0.02em; min-width: 0;
    }
    #typing-text:empty::before { content: '…'; color: var(--muted); opacity: 0.4; }
    #typing-cursor {
      flex-shrink: 0; width: 2px; height: 17px; border-radius: 1px;
      background: hsla(calc(var(--rgb, 0) * 1 + 180), 90%, 65%, 1);
      animation: cursor-blink 1s step-end infinite;
    }
    @keyframes cursor-blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    #typing-clear {
      flex-shrink: 0; background: none; border: none; color: var(--muted);
      font-size: 14px; cursor: pointer; padding: 2px 4px; opacity: 0.5;
      line-height: 1;
    }

    /* Keyboard main layout (rows + joystick side by side) */
    #kb-main {
      flex: 1; display: flex; flex-direction: row; min-height: 0;
    }

    /* Key rows container */
    #kb-rows {
      flex: 1; min-width: 0; display: flex; flex-direction: column;
      gap: 5px; padding: 6px 6px 5px; justify-content: center;
      background: linear-gradient(to top,
        hsla(calc(var(--rgb, 0) * 1), 75%, 18%, 0.20), transparent 82%);
    }
    .kb-row { display: flex; gap: 5px; justify-content: center; }
    .kb-key {
      --key-pos: 0;
      --kh: calc(var(--key-pos) * 36 + var(--rgb, 0));
      flex: 1; min-width: 0; height: 42px;
      background: var(--surface);
      border: 1px solid hsla(var(--kh), 65%, 52%, 0.38);
      border-radius: 7px; color: var(--text); font-size: 16px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.08s, box-shadow 0.14s, border-color 0.14s;
      transform-origin: center;
      box-shadow: 0 2px 0 0 hsla(var(--kh), 88%, 58%, 0.42);
    }
    .kb-key:active, .kb-key.pressing {
      background: hsla(var(--kh), 42%, 20%, 0.95);
      border-color: hsla(var(--kh), 88%, 64%, 0.80);
      box-shadow:
        0 0 16px hsla(var(--kh), 100%, 60%, 0.52),
        0 2px 0 0 hsla(var(--kh), 100%, 68%, 0.85),
        inset 0 0 10px hsla(var(--kh), 100%, 58%, 0.18);
    }
    .kb-key.kb-wide      { flex: 1.5; font-size: 17px; }
    .kb-key.kb-space     { flex: 4;   font-size: 13px; color: var(--muted); }
    .kb-key.kb-sym-space { flex: 3;   font-size: 13px; color: var(--muted); }
    .kb-key.kb-caps-on   { background: var(--accent); color: #fff; border-color: var(--accent); }
    .kb-key.kb-arrow     { flex: 1; font-size: 20px; color: var(--muted); }
    .kb-key.kb-tab       { flex: 1.5; font-size: 15px; color: var(--muted); }
    .kb-spacer           { flex: 0.5; min-width: 0; pointer-events: none; }

    /* ── Joysticks ── */
    .joy-col {
      flex-shrink: 0; width: 86px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 7px; padding: 4px 0;
    }
    #joy-col-l { border-right: 1px solid var(--border); }
    #joy-col-r { border-left:  1px solid var(--border); }
    .joy-ring {
      width: 68px; height: 68px; border-radius: 50%; position: relative;
      background: radial-gradient(circle at 50% 50%,
        rgba(255,255,255,0.05) 0%, var(--surface) 55%, rgba(0,0,0,0.12) 100%);
      border: 1px solid hsla(calc(var(--rgb, 180) * 1), 50%, 50%, 0.38);
      box-shadow: 0 0 18px hsla(calc(var(--rgb, 180) * 1), 70%, 40%, 0.13),
                  inset 0 1px 0 rgba(255,255,255,0.07),
                  inset 0 -1px 0 rgba(0,0,0,0.18);
      touch-action: none; cursor: pointer;
    }
    .joy-ring::before {
      content: ''; position: absolute;
      top: 14%; bottom: 14%; left: 50%; width: 1px;
      background: rgba(255,255,255,0.07); transform: translateX(-50%);
    }
    .joy-ring::after {
      content: ''; position: absolute;
      left: 14%; right: 14%; top: 50%; height: 1px;
      background: rgba(255,255,255,0.07); transform: translateY(-50%);
    }
    .joy-thumb {
      width: 26px; height: 26px; border-radius: 50%; pointer-events: none;
      background: radial-gradient(circle at 38% 32%,
        hsla(calc(var(--rgb, 0) + 60), 90%, 72%, 1),
        hsla(calc(var(--rgb, 0) + 60), 75%, 46%, 1) 70%);
      border: 1px solid hsla(calc(var(--rgb, 0) + 60), 80%, 65%, 0.5);
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 8px hsla(calc(var(--rgb, 0) + 60), 100%, 55%, 0.45),
                  inset 0 1px 0 rgba(255,255,255,0.2);
      will-change: transform;
    }
    .joy-label {
      font-size: 9px; color: var(--muted); opacity: 0.4;
      letter-spacing: 0.06em; text-transform: uppercase;
    }
    #mouse-btns { display: flex; gap: 5px; }
    .mouse-btn {
      min-width: 26px; height: 22px; padding: 0 5px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 5px; color: var(--muted); font-size: 11px; font-weight: 500;
      cursor: pointer; touch-action: manipulation;
    }
    .mouse-btn.pressing { background: var(--surface-active); border-color: var(--accent); color: var(--text); }

    /* ── Animations ── */
    @keyframes btn-tap {
      0%   { transform: scale(1)    rotate(0deg); }
      22%  { transform: scale(0.87) rotate(-6deg); }
      55%  { transform: scale(0.92) rotate(4deg); }
      80%  { transform: scale(0.98) rotate(-1deg); }
      100% { transform: scale(1)    rotate(0deg); }
    }
    .kb-key.tapped { animation: btn-tap 0.28s cubic-bezier(.36,.07,.19,.97) both; }

    /* ── Landscape ── */
    @media (orientation: landscape) {
      #status-bar           { padding: 4px 14px; }
      #settings-panel.open  { max-height: 190px; padding: 8px 14px; }
      .setting-row          { margin-bottom: 7px; }
      #tabs                 { padding: 5px 12px 0; }
      .tab                  { padding: 5px 0; font-size: 13px; }
      #content              { margin-bottom: 6px; }
      #typing-bar           { min-height: 32px; padding: 5px 10px; }
      #typing-text          { font-size: 14px; }
      #kb-rows              { gap: 4px; padding: 4px 6px 4px; }
      .kb-row               { gap: 4px; }
      .kb-key               { height: 34px; font-size: 15px; }
      .kb-key.kb-wide       { font-size: 16px; }
      .joy-col   { width: 62px; }
      .joy-ring  { width: 50px; height: 50px; }
      .joy-thumb { width: 20px; height: 20px; }
      .mouse-btn { height: 17px; font-size: 9px; min-width: 20px; }
      #click-bar      { height: 40px; }
      #hint-icon            { font-size: 24px; }
    }
  </style>
</head>
<body>
<div id="app">

  <div id="status-bar">
    <div style="display:flex;align-items:center">
      <div id="dot"></div>
      <span id="status-text">Connexion…</span>
    </div>
    <div id="toolbar">
      <button id="rot-btn"      aria-label="Rotation">⟳</button>
      <button id="fs-btn"       aria-label="Plein écran">⛶</button>
      <button id="settings-btn" aria-label="Réglages">⚙</button>
    </div>
  </div>

  <div id="settings-panel">
    <div class="setting-row">
      <span class="setting-label">Souris</span>
      <div class="seg" id="mouse-seg">
        <button class="seg-btn" data-val="0.9">Lent</button>
        <button class="seg-btn active" data-val="1.8">Normal</button>
        <button class="seg-btn" data-val="3.2">Rapide</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Défilement</span>
      <div class="seg" id="scroll-seg">
        <button class="seg-btn" data-thresh="15" data-amount="1">Lent</button>
        <button class="seg-btn active" data-thresh="6" data-amount="2">Normal</button>
        <button class="seg-btn" data-thresh="2" data-amount="5">Rapide</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Direction</span>
      <div class="seg" id="scroll-dir-seg">
        <button class="seg-btn active" data-val="1">Naturel</button>
        <button class="seg-btn" data-val="-1">Inversé</button>
      </div>
    </div>
    <div class="setting-row">
      <span class="setting-label">Son clavier</span>
      <div class="seg" id="sound-seg">
        <button class="seg-btn active" data-val="1">Activé</button>
        <button class="seg-btn" data-val="0">Désactivé</button>
      </div>
    </div>
  </div>

  <div id="tabs">
    <button class="tab active" id="tab-touchpad">Touchpad</button>
    <button class="tab"        id="tab-keyboard">Clavier</button>
  </div>

  <div id="content">
    <!-- Touchpad -->
    <div id="touchpad-panel">
      <div id="tp-area">
        <div id="hint">
          <div id="hint-icon">☝️</div>
          <div id="hint-text">Glisser pour déplacer la souris</div>
          <div id="hint-sub">2 doigts pour défiler · Tap pour cliquer</div>
        </div>
      </div>
      <div id="click-bar">
        <div class="click-zone" id="zone-left"><div class="click-zone-dot"></div></div>
        <div class="click-zone" id="zone-right"><div class="click-zone-dot"></div></div>
      </div>
    </div>

    <!-- Keyboard -->
    <div id="keyboard-panel">
      <div id="typing-bar">
        <span id="typing-text"></span>
        <div id="typing-cursor"></div>
        <button id="typing-clear" aria-label="Effacer">✕</button>
      </div>
      <div id="kb-main">
        <div class="joy-col" id="joy-col-l">
          <div class="joy-ring" id="joy-l"><div class="joy-thumb" id="joy-l-thumb"></div></div>
          <span class="joy-label">nav</span>
        </div>
        <div id="kb-rows"></div>
        <div class="joy-col" id="joy-col-r">
          <div class="joy-ring" id="joy-r"><div class="joy-thumb" id="joy-r-thumb"></div></div>
          <div id="mouse-btns">
            <button class="mouse-btn" id="mbtn-l" data-button="left">L</button>
            <button class="mouse-btn" id="mbtn-r" data-button="right">R</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
<script>
(function () {
  'use strict';

  const TAP_MAX_MS      = 250;
  const TAP_MAX_PX      = 12;
  const TWO_TAP_MAX_MS  = 300;
  const TWO_TAP_MAX_PX  = 15;
  const CLICK_BAR_RATIO = 0.78;
  const RECONNECT_MS    = 2000;

  // ── Settings ─────────────────────────────────────────────
  let mouseSens    = parseFloat(localStorage.getItem('mouseSens')    || '1.8');
  let scrollThresh = parseFloat(localStorage.getItem('scrollThresh') || '6');
  let scrollAmount = parseFloat(localStorage.getItem('scrollAmount') || '2');
  let scrollDir    = parseFloat(localStorage.getItem('scrollDir')    || '1');
  let soundEnabled = parseFloat(localStorage.getItem('soundEnabled') || '1');

  // ── DOM ──────────────────────────────────────────────────
  const dot           = document.getElementById('dot');
  const statusText    = document.getElementById('status-text');
  const settingsBtn   = document.getElementById('settings-btn');
  const settingsPanel = document.getElementById('settings-panel');
  const mouseSeg      = document.getElementById('mouse-seg');
  const scrollSeg     = document.getElementById('scroll-seg');
  const scrollDirSeg  = document.getElementById('scroll-dir-seg');
  const soundSeg      = document.getElementById('sound-seg');
  const touchpadPanel = document.getElementById('touchpad-panel');
  const keyboardPanel = document.getElementById('keyboard-panel');
  const kbRows        = document.getElementById('kb-rows');
  const typingText    = document.getElementById('typing-text');
  const typingClear   = document.getElementById('typing-clear');
  const hint          = document.getElementById('hint');
  const tabTouchpad   = document.getElementById('tab-touchpad');
  const tabKeyboard   = document.getElementById('tab-keyboard');
  const zoneLeft      = document.getElementById('zone-left');
  const zoneRight     = document.getElementById('zone-right');
  const fsBtn         = document.getElementById('fs-btn');
  const rotBtn        = document.getElementById('rot-btn');

  // ── Settings UI ──────────────────────────────────────────
  function initSeg(seg, key, val, cb) {
    seg.querySelectorAll('.seg-btn').forEach(btn => {
      btn.classList.toggle('active', parseFloat(btn.dataset.val) === val);
      btn.addEventListener('click', () => {
        seg.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const v = parseFloat(btn.dataset.val);
        localStorage.setItem(key, String(v));
        cb(v);
      });
    });
  }
  initSeg(mouseSeg,     'mouseSens',    mouseSens,    v => { mouseSens    = v; });
  initSeg(scrollDirSeg, 'scrollDir',    scrollDir,    v => { scrollDir    = v; });
  initSeg(soundSeg,     'soundEnabled', soundEnabled, v => { soundEnabled = v; });
  (function () {
    const btns = scrollSeg.querySelectorAll('.seg-btn');
    btns.forEach(btn => {
      btn.classList.toggle('active',
        parseFloat(btn.dataset.thresh) === scrollThresh && parseFloat(btn.dataset.amount) === scrollAmount);
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        scrollThresh = parseFloat(btn.dataset.thresh);
        scrollAmount = parseFloat(btn.dataset.amount);
        localStorage.setItem('scrollThresh', String(scrollThresh));
        localStorage.setItem('scrollAmount', String(scrollAmount));
      });
    });
  }());
  settingsBtn.addEventListener('click', () =>
    settingsBtn.classList.toggle('active', settingsPanel.classList.toggle('open')));

  // ── Tabs ─────────────────────────────────────────────────
  function showTab(name) {
    const isTP = name === 'touchpad';
    tabTouchpad.classList.toggle('active',  isTP);
    tabKeyboard.classList.toggle('active', !isTP);
    touchpadPanel.style.display = isTP ? 'flex' : 'none';
    keyboardPanel.classList.toggle('visible', !isTP);
    lockOrientation(isTP ? 'portrait' : 'landscape');
    isTP ? stopRgbLoop() : startRgbLoop();
  }
  tabTouchpad.addEventListener('click', () => showTab('touchpad'));
  tabKeyboard.addEventListener('click', () => showTab('keyboard'));

  // ── WebSocket ────────────────────────────────────────────
  let ws = null;
  function connect() {
    ws = new WebSocket(`ws://${location.host}`);
    ws.onopen  = () => { dot.classList.add('on');    statusText.textContent = 'Connecté'; };
    ws.onclose = () => { dot.classList.remove('on'); statusText.textContent = 'Reconnexion…'; setTimeout(connect, RECONNECT_MS); };
    ws.onerror = () => { statusText.textContent = 'Erreur'; };
  }
  function send(ev) {
    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(ev));
  }

  // ── Click helpers ─────────────────────────────────────────
  let zoneFlashTimer = null;
  function flashZone(button) {
    const zone = button === 'left' ? zoneLeft : zoneRight;
    const cls  = button === 'left' ? 'flash-left' : 'flash-right';
    zone.classList.add(cls);
    clearTimeout(zoneFlashTimer);
    zoneFlashTimer = setTimeout(() => zone.classList.remove(cls), 220);
  }

  function ripple(tx, ty, button) {
    const r  = touchpadPanel.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = `ripple ${button}`;
    el.style.left = (tx - r.left) + 'px';
    el.style.top  = (ty - r.top)  + 'px';
    touchpadPanel.appendChild(el);
    setTimeout(() => el.remove(), 500);
  }

  function doClick(button, tx, ty) {
    send({ type: 'mouse.click', button });
    flashZone(button);
    if (tx != null) ripple(tx, ty, button);
  }

  // ── Touchpad ─────────────────────────────────────────────
  let lastX = 0, lastY = 0, startX = 0, startY = 0, startTime = 0;
  let lastTwoFingerY = 0, scrollAccum = 0;
  let isTwoFinger = false, moved = false, hintHidden = false;
  let twoFingerStartTime = 0, twoFingerDelta = 0;

  function hideHint() { if (!hintHidden) { hintHidden = true; hint.classList.add('hidden'); } }

  touchpadPanel.addEventListener('touchstart', (e) => {
    e.preventDefault(); hideHint(); touchpadPanel.classList.add('pressing');
    if (e.touches.length === 1 && !isTwoFinger) {
      lastX = startX = e.touches[0].clientX;
      lastY = startY = e.touches[0].clientY;
      startTime = Date.now(); moved = false;
    }
    if (e.touches.length === 2) {
      isTwoFinger = true;
      lastTwoFingerY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      scrollAccum = 0; twoFingerStartTime = Date.now(); twoFingerDelta = 0;
    }
  }, { passive: false });

  touchpadPanel.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && !isTwoFinger) {
      const dx = (e.touches[0].clientX - lastX) * mouseSens;
      const dy = (e.touches[0].clientY - lastY) * mouseSens;
      lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
      const rdx = Math.round(dx), rdy = Math.round(dy);
      if (rdx !== 0 || rdy !== 0) { moved = true; send({ type: 'mouse.move', dx: rdx, dy: rdy }); }
    }
    if (e.touches.length === 2) {
      const avgY  = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const delta = avgY - lastTwoFingerY;
      twoFingerDelta += Math.abs(delta);
      scrollAccum += delta; lastTwoFingerY = avgY;
      const ticks = Math.trunc(scrollAccum / scrollThresh);
      if (ticks !== 0) {
        send({ type: 'mouse.scroll', delta: ticks * scrollAmount * scrollDir });
        scrollAccum -= ticks * scrollThresh;
      }
    }
  }, { passive: false });

  touchpadPanel.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (e.touches.length === 0) {
      touchpadPanel.classList.remove('pressing');
      if (isTwoFinger) {
        if (twoFingerDelta < TWO_TAP_MAX_PX && Date.now() - twoFingerStartTime < TWO_TAP_MAX_MS) {
          const t = e.changedTouches[0];
          doClick('right', t.clientX, t.clientY);
        }
      } else if (!moved) {
        const t    = e.changedTouches[0];
        const dt   = Date.now() - startTime;
        const dist = Math.hypot(t.clientX - startX, t.clientY - startY);
        if (dt < TAP_MAX_MS && dist < TAP_MAX_PX) {
          const rect    = touchpadPanel.getBoundingClientRect();
          const inBar   = (t.clientY - rect.top) > rect.height * CLICK_BAR_RATIO;
          const isRight = (t.clientX - rect.left) > rect.width / 2;
          doClick((inBar && isRight) ? 'right' : 'left', t.clientX, t.clientY);
        }
      }
      isTwoFinger = false; scrollAccum = 0; moved = false;
    }
  }, { passive: false });

  // ── Typing display ────────────────────────────────────────
  let typingBuffer = '';

  // ── RGB animation ─────────────────────────────────────────
  let rgbOffset    = 0;
  let rgbAnimFrame = null;

  function startRgbLoop() {
    if (rgbAnimFrame) return;
    (function tick() {
      rgbOffset = (rgbOffset + 0.38) % 360;
      keyboardPanel.style.setProperty('--rgb', String(Math.round(rgbOffset)));
      rgbAnimFrame = requestAnimationFrame(tick);
    }());
  }
  function stopRgbLoop() {
    if (rgbAnimFrame) { cancelAnimationFrame(rgbAnimFrame); rgbAnimFrame = null; }
  }

  function updateTyping() {
    typingText.textContent = typingBuffer;
  }

  typingClear.addEventListener('touchstart', (e) => {
    e.preventDefault();
    typingBuffer = '';
    updateTyping();
  }, { passive: false });
  typingClear.addEventListener('click', () => { typingBuffer = ''; updateTyping(); });

  // ── Keyboard ─────────────────────────────────────────────
  const KB_LETTERS = [
    ['1','2','3','4','5','6','7','8','9','0'],
    ['q','w','e','r','t','y','u','i','o','p'],
    [null,'a','s','d','f','g','h','j','k','l',null],
    ['CAPS','z','x','c','v','b','n','m','BACK'],
    ['TAB','SYM','SPACE','ENTER'],
  ];
  const KB_SYMBOLS = [
    ['!','@','#','$','%','^','&','*','(',')'],
    ['-','_','=','+',"[",']','{','}',';',':'],
    ["'",'"',',','.','/',`?`,'\\','~','|','`'],
    ['TAB','ABC','SYM_SPACE','ENTER','BACK'],
  ];

  let kbMode = 'letters';
  let capsOn  = false;

  function animBtn(el) {
    el.classList.remove('tapped'); void el.offsetWidth;
    el.classList.add('tapped');
    el.addEventListener('animationend', () => el.classList.remove('tapped'), { once: true });
  }

  function buildKeyboard(mode) {
    kbRows.innerHTML = '';
    (mode === 'letters' ? KB_LETTERS : KB_SYMBOLS).forEach(row => {
      const rowEl = document.createElement('div');
      rowEl.className = 'kb-row';
      row.forEach((k, colIndex) => {
        if (k === null) {
          const sp = document.createElement('div'); sp.className = 'kb-spacer';
          rowEl.appendChild(sp); return;
        }
        const btn = document.createElement('button');
        btn.className = 'kb-key'; btn.dataset.key = k;
        btn.style.setProperty('--key-pos', String(colIndex));
        switch (k) {
          case 'CAPS':       btn.id = 'kb-caps'; btn.textContent = '⇧'; btn.classList.add('kb-wide'); if (capsOn) btn.classList.add('kb-caps-on'); break;
          case 'BACK':       btn.textContent = '⌫';      btn.classList.add('kb-wide');  break;
          case 'ENTER':      btn.textContent = '↵';      btn.classList.add('kb-wide');  break;
          case 'SYM':        btn.textContent = '!@#';    btn.classList.add('kb-wide');  break;
          case 'ABC':        btn.textContent = 'ABC';    btn.classList.add('kb-wide');  break;
          case 'TAB':        btn.textContent = '⇥ Tab';  btn.classList.add('kb-tab');   break;
          case 'SPACE':      btn.textContent = 'espace'; btn.classList.add('kb-space'); break;
          case 'SYM_SPACE':  btn.textContent = 'espace'; btn.classList.add('kb-sym-space'); break;
          default:
            btn.textContent = (mode === 'letters' && capsOn && k >= 'a' && k <= 'z')
              ? k.toUpperCase() : k;
        }
        rowEl.appendChild(btn);
      });
      kbRows.appendChild(rowEl);
    });
  }

  function updateCapsDisplay() {
    kbRows.querySelectorAll('.kb-key').forEach(btn => {
      const k = btn.dataset.key;
      if (k && k.length === 1 && k >= 'a' && k <= 'z') btn.textContent = capsOn ? k.toUpperCase() : k;
    });
    const c = document.getElementById('kb-caps');
    if (c) c.classList.toggle('kb-caps-on', capsOn);
  }

  function handleKey(k) {
    if (k === 'CAPS')  { capsOn = !capsOn; updateCapsDisplay(); return; }
    if (k === 'SYM')   { kbMode = 'symbols'; buildKeyboard('symbols'); return; }
    if (k === 'ABC')   { kbMode = 'letters'; buildKeyboard('letters');  return; }

    if (k === 'BACK') {
      typingBuffer = typingBuffer.slice(0, -1);
      updateTyping();
      send({ type: 'keyboard.type', key: 'Backspace' }); return;
    }
    if (k === 'ENTER') {
      typingBuffer = '';
      updateTyping();
      send({ type: 'keyboard.type', key: 'Enter' }); return;
    }
    if (k === 'TAB') { send({ type: 'keyboard.type', key: 'Tab' }); return; }
    if (k === 'SPACE' || k === 'SYM_SPACE') {
      typingBuffer += ' ';
      updateTyping();
      send({ type: 'keyboard.type', key: ' ' }); return;
    }

    const char = (kbMode === 'letters' && k.length === 1 && k >= 'a' && k <= 'z')
      ? (capsOn ? k.toUpperCase() : k) : k;
    typingBuffer += char;
    updateTyping();
    send({ type: 'keyboard.type', key: char });
  }

  const NO_REPEAT = new Set(['CAPS', 'SYM', 'ABC']);
  let repeatDelayTimer = null;
  let repeatIntervalTimer = null;

  function stopKeyRepeat() {
    clearTimeout(repeatDelayTimer);
    clearInterval(repeatIntervalTimer);
    repeatDelayTimer = repeatIntervalTimer = null;
  }

  kbRows.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const btn = e.target.closest('.kb-key');
    if (!btn) return;
    const k = btn.dataset.key;
    btn.classList.add('pressing');
    animBtn(btn);
    playKeyClick();
    handleKey(k);
    if (NO_REPEAT.has(k)) return;
    repeatDelayTimer = setTimeout(() => {
      repeatIntervalTimer = setInterval(() => {
        handleKey(k);
        playKeyClick();
      }, 65);
    }, 420);
  }, { passive: false });

  kbRows.addEventListener('touchend', (e) => {
    e.preventDefault();
    stopKeyRepeat();
    kbRows.querySelectorAll('.kb-key.pressing').forEach(b => b.classList.remove('pressing'));
  }, { passive: false });

  kbRows.addEventListener('touchcancel', (e) => {
    e.preventDefault();
    stopKeyRepeat();
    kbRows.querySelectorAll('.kb-key.pressing').forEach(b => b.classList.remove('pressing'));
  }, { passive: false });

  // ── Mechanical sound ──────────────────────────────────────
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  function playKeyClick() {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();
      const t   = ctx.currentTime;
      const v   = 0.82 + Math.random() * 0.36;

      function noiseLayer(freq, filterType, Q, gain, decay) {
        const len = Math.ceil(ctx.sampleRate * decay * 3);
        const buf = ctx.createBuffer(1, len, ctx.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < len; i++)
          d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * decay));
        const src = ctx.createBufferSource();
        src.buffer = buf;
        const flt = ctx.createBiquadFilter();
        flt.type = filterType; flt.frequency.value = freq * v;
        if (Q) flt.Q.value = Q;
        const gn = ctx.createGain();
        gn.gain.setValueAtTime(gain, t);
        src.connect(flt); flt.connect(gn); gn.connect(ctx.destination);
        src.start(t);
      }

      noiseLayer(5500, 'highpass', 0,   0.50, 0.003);
      noiseLayer(1800, 'bandpass', 1.8, 0.22, 0.012);
      noiseLayer(700,  'lowpass',  0,   0.07, 0.022);
    } catch (_) {}
  }

  // ── Fullscreen + Rotation ─────────────────────────────────
  async function lockOrientation(type) {
    if (!screen.orientation || !screen.orientation.lock) return;
    try { await screen.orientation.lock(type); } catch {
      try {
        const el  = document.documentElement;
        const req = el.requestFullscreen || el.webkitRequestFullscreen;
        if (req) await req.call(el, { navigationUI: 'hide' });
        await screen.orientation.lock(type);
      } catch (_) {}
    }
  }

  async function toggleOrientation() {
    const isPortrait = screen.orientation
      ? screen.orientation.type.startsWith('portrait')
      : window.innerHeight > window.innerWidth;
    await lockOrientation(isPortrait ? 'landscape' : 'portrait');
  }

  function toggleFullscreen() {
    const el = document.documentElement;
    if (document.fullscreenElement || document.webkitFullscreenElement) {
      (document.exitFullscreen || document.webkitExitFullscreen).call(document);
    } else {
      const req = el.requestFullscreen || el.webkitRequestFullscreen;
      if (req) req.call(el, { navigationUI: 'hide' });
    }
  }

  function onFsChange() {
    const on = !!(document.fullscreenElement || document.webkitFullscreenElement);
    fsBtn.textContent = on ? '⊡' : '⛶';
    fsBtn.classList.toggle('active', on);
  }

  function updateRotBtn() {
    const isP = screen.orientation
      ? screen.orientation.type.startsWith('portrait')
      : window.innerHeight > window.innerWidth;
    rotBtn.textContent = isP ? '⤢' : '⤡';
  }

  rotBtn.addEventListener('click', toggleOrientation);
  fsBtn.addEventListener('click',  toggleFullscreen);
  document.addEventListener('fullscreenchange',       onFsChange);
  document.addEventListener('webkitfullscreenchange', onFsChange);
  screen.orientation && screen.orientation.addEventListener('change', updateRotBtn);
  window.addEventListener('resize', updateRotBtn);
  updateRotBtn();

  // ── Joystick factory ─────────────────────────────────────
  function makeJoystick(ring, thumb, onMove, onStop) {
    const DEAD = 9;
    let active = false;

    function maxTravel() { return ring.getBoundingClientRect().width * 0.29; }

    function updateThumb(dx, dy) {
      const dist = Math.hypot(dx, dy);
      const max  = maxTravel();
      const s    = dist > max ? max / dist : 1;
      thumb.style.transform =
        `translate(calc(-50% + ${dx * s}px), calc(-50% + ${dy * s}px))`;
      return { dist, angle: Math.atan2(dy, dx) };
    }

    function snapBack() {
      thumb.style.transition = 'transform 0.22s cubic-bezier(.18,.89,.32,1.28)';
      thumb.style.transform  = 'translate(-50%, -50%)';
      setTimeout(() => { thumb.style.transition = 'none'; }, 240);
    }

    function process(touch) {
      const rect  = ring.getBoundingClientRect();
      const dx    = touch.clientX - (rect.left + rect.width  / 2);
      const dy    = touch.clientY - (rect.top  + rect.height / 2);
      const { dist, angle } = updateThumb(dx, dy);
      if (dist < DEAD) { onMove(0, 0, 0); return; }
      const max   = maxTravel();
      const ratio = Math.min(1, (dist - DEAD) / Math.max(1, max - DEAD));
      onMove(Math.cos(angle), Math.sin(angle), ratio);
    }

    ring.addEventListener('touchstart', (e) => {
      e.preventDefault(); active = true;
      thumb.style.transition = 'none';
      process(e.touches[0]);
    }, { passive: false });

    ring.addEventListener('touchmove', (e) => {
      e.preventDefault();
      if (active) process(e.touches[0]);
    }, { passive: false });

    function release(e) { e.preventDefault(); active = false; onStop(); snapBack(); }
    ring.addEventListener('touchend',    release, { passive: false });
    ring.addEventListener('touchcancel', release, { passive: false });
  }

  // ── Left joystick: navigation (arrow keys) ───────────────
  (function () {
    const ring  = document.getElementById('joy-l');
    const thumb = document.getElementById('joy-l-thumb');
    if (!ring) return;

    const BASE_MS = 190, FAST_MS = 55;
    let repeatTimer = null, activeDirs = [], altIdx = 0;

    function dirsFromAngle(a) {
      const n = ((a * 180 / Math.PI) % 360 + 360) % 360;
      if (n <= 22.5  || n > 337.5)  return ['ArrowRight'];
      if (n > 22.5   && n <= 67.5)  return ['ArrowRight', 'ArrowDown'];
      if (n > 67.5   && n <= 112.5) return ['ArrowDown'];
      if (n > 112.5  && n <= 157.5) return ['ArrowDown', 'ArrowLeft'];
      if (n > 157.5  && n <= 202.5) return ['ArrowLeft'];
      if (n > 202.5  && n <= 247.5) return ['ArrowLeft', 'ArrowUp'];
      if (n > 247.5  && n <= 292.5) return ['ArrowUp'];
      return ['ArrowUp', 'ArrowRight'];
    }

    function stop() {
      if (repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; }
      activeDirs = [];
    }

    makeJoystick(ring, thumb, (nx, ny, ratio) => {
      if (ratio === 0) { stop(); return; }
      const ms   = Math.round(BASE_MS - ratio * (BASE_MS - FAST_MS));
      const dirs = dirsFromAngle(Math.atan2(ny, nx));
      if (dirs.join() === activeDirs.join()) return;
      activeDirs = dirs; altIdx = 0;
      if (repeatTimer) clearInterval(repeatTimer);
      const fire = () => send({ type: 'keyboard.type', key: dirs[altIdx++ % dirs.length] });
      fire();
      repeatTimer = setInterval(fire, ms);
    }, stop);
  }());

  // ── Right joystick: mouse movement ───────────────────────
  (function () {
    const ring  = document.getElementById('joy-r');
    const thumb = document.getElementById('joy-r-thumb');
    if (!ring) return;

    let jNx = 0, jNy = 0, jRatio = 0, moveTimer = null;

    function stop() {
      jNx = jNy = jRatio = 0;
      if (moveTimer) { clearInterval(moveTimer); moveTimer = null; }
    }

    makeJoystick(ring, thumb, (nx, ny, ratio) => {
      jNx = nx; jNy = ny; jRatio = ratio;
      if (ratio > 0 && !moveTimer) {
        moveTimer = setInterval(() => {
          if (jRatio === 0) return;
          const speed = jRatio * jRatio * 10 * mouseSens;
          const dx = Math.round(jNx * speed);
          const dy = Math.round(jNy * speed);
          if (dx !== 0 || dy !== 0) send({ type: 'mouse.move', dx, dy });
        }, 16);
      } else if (ratio === 0) {
        stop();
      }
    }, stop);
  }());

  // ── Mouse click buttons ───────────────────────────────────
  document.querySelectorAll('.mouse-btn').forEach(btn => {
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      btn.classList.add('pressing');
      send({ type: 'mouse.click', button: btn.dataset.button });
    }, { passive: false });
    btn.addEventListener('touchend',    (e) => { e.preventDefault(); btn.classList.remove('pressing'); }, { passive: false });
    btn.addEventListener('touchcancel', (e) => { e.preventDefault(); btn.classList.remove('pressing'); }, { passive: false });
  });

  // ── Init ─────────────────────────────────────────────────
  buildKeyboard('letters');
  connect();
}());
</script>
</body>
</html>
